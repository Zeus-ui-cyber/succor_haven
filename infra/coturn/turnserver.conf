# turnserver.conf — self-hosted STUN/TURN for "My Sessions" video meetings.
#
# Deliberately NOT Google's public STUN servers — this whole feature exists
# so the platform doesn't depend on any Google service, which matters for
# deployment in China. Run this yourself (coturn, https://github.com/coturn/coturn)
# on a VPS with a public IP, ideally one already reachable from mainland China.
#
# listening-port is 3478 (standard STUN/TURN) AND tls-listening-port 443 —
# TURN-over-443/TLS is the practical way to get through the Great Firewall
# and restrictive campus/corporate firewalls, since 443 looks like ordinary
# HTTPS traffic. Configure src/services/turn.service.js's TURN_URL env var
# to point at whichever port you actually want clients to use.

listening-port=3478
tls-listening-port=443

# Set to this server's real public IP before deploying.
external-ip=YOUR_SERVER_PUBLIC_IP

fingerprint
lt-cred-mech

# Must match TURN_SECRET in the API's .env — src/services/turn.service.js
# signs short-lived per-user credentials with this same shared secret
# (coturn's REST API / time-limited credentials mechanism).
static-auth-secret=CHANGE_ME_MATCH_TURN_SECRET_ENV_VAR

realm=succorhaven.app

# TLS cert/key for tls-listening-port=443 — use a real cert (e.g. Let's
# Encrypt) in production, not self-signed, or WebRTC clients will refuse it.
cert=/etc/coturn/cert.pem
pkey=/etc/coturn/privkey.pem

# Restrict the UDP relay port range so it's easy to open in a firewall/
# security group alongside 3478 and 443.
min-port=49152
max-port=49452

no-cli
no-tlsv1
no-tlsv1_1
