name: succor_haven
description: Succor Haven — bilingual tutoring platform (EN/中文)
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # HTTP client (API calls)
  http: ^1.2.1
  dio: ^5.9.2

  # Secure token storage (mobile)
  flutter_secure_storage: ^9.2.2

  # Web-compatible token storage
  shared_preferences: ^2.2.2

  # URL launching (social links, tel, mailto, opening module files)
  url_launcher: ^6.2.6

  # Image selection (Edit Profile → profile picture upload)
  image_picker: ^1.1.2

  # Charts (Admin dashboard analytics)
  fl_chart: ^1.1.0

  # File selection (Module Management → upload PDF/DOCX/PPTX materials)
  # Not a Google package — plain OS-level file dialogs, safe for
  # China-facing deployments.
  file_picker: ^11.0.2

  # PDF receipt generation (Buy Credits → download/share receipt)
  pdf: ^3.11.1
  printing: ^5.13.4

  # ── My Sessions (video meetings) ─────────────────────────────────────
  # WebRTC peer connections, talking to our own coturn STUN/TURN server
  # (infra/coturn/) — not Google's, so this stays usable in China. Not
  # yet wired into any screen (Phase 2 of the build-out); declared now so
  # `flutter pub get` picks it up ahead of that work.
  flutter_webrtc: ^1.5.2

  # Signaling/chat/whiteboard/presence transport, talking to this repo's
  # own Socket.IO server (src/realtime/socket.server.js) — no third-party
  # realtime SaaS involved.
  socket_io_client: ^2.0.3+1

  # Runtime camera/microphone permission prompts, required by flutter_webrtc
  # on Android/iOS before a call can start.
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    # Uncomment after adding social icons to assets/icons/
    # - assets/icons/facebook.png
    # - assets/icons/instagram.png
    # - assets/icons/youtube.png
    # - assets/icons/tiktok.png
    # - assets/icons/x.png